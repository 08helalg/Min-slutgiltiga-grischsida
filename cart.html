<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kundvagn - Misz Musik Hörna</title>
    <link rel="stylesheet" href="css/Tomellete.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="site-logo" href="greggs.html">Misz Musik Hörna</a>
        <nav class="nav-list" aria-label="Primär navigation">
          <a href="greggs.html">Hem</a>
          <a href="gallerian.html">Gallerian</a>
          <a href="erbjudanden.html">Erbjudanden</a>
          <a href="om.html">Om</a>
          <a href="kontakt.html">Kontakt</a>
        </nav>
        <button class="cart-button" type="button" aria-label="Öppna kundvagn">
          🛒
        </button>
      </div>
    </header>

    <div class="cart-panel" id="cartPanel">
      <div class="cart-content">
        <button class="close-cart" id="closeCart" aria-label="Stäng kundvagn">
          ✕
        </button>
        <h2>Kundvagn</h2>
        <div id="cartItems"></div>
      </div>
    </div>

    <div class="content">
      <h2>Din Kundvagn</h2>
      <div id="cartList"></div>
      <p>Total: <span id="total">0</span> kr</p>
      <button onclick="checkout()">Checkout</button>
      <a href="gallerian.html"><button>Tillbaka till Gallerian</button></a>
    </div>

    <script>
      const cartButton = document.querySelector(".cart-button");
      const cartPanel = document.getElementById("cartPanel");
      const closeCart = document.getElementById("closeCart");

      cartButton.addEventListener("click", () => {
        cartPanel.classList.add("open");
      });

      closeCart.addEventListener("click", () => {
        cartPanel.classList.remove("open");
      });

      cartPanel.addEventListener("click", (e) => {
        if (e.target === cartPanel) {
          cartPanel.classList.remove("open");
        }
      });

      // Load cart items
      function loadCart() {
        const cartList = document.getElementById("cartList");
        const cartItems = document.getElementById("cartItems");
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cartList.innerHTML = "";
        cartItems.innerHTML = "";
        let total = 0;
        cart.forEach((item, index) => {
          total += item.price;
          const div = document.createElement("div");
          div.innerHTML = `<p>${item.name} - ${item.price} kr <button onclick="removeFromCart(${index})">Ta bort</button></p>`;
          cartList.appendChild(div);
          const div2 = document.createElement("div");
          div2.innerHTML = `<p>${item.name} - ${item.price} kr <button onclick="removeFromCart(${index})">Ta bort</button></p>`;
          cartItems.appendChild(div2);
        });
        document.getElementById("total").textContent = total;
      }

      function removeFromCart(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
      }

      function checkout() {
        alert("Tack för ditt köp!");
        localStorage.removeItem("cart");
        loadCart();
      }

      loadCart();
    </script>
  </body>
</html>
